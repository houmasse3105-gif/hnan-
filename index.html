<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinematic Scene</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

  <!-- Style -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="scene">

    <!-- Camera (كل شيء يتحرك داخله) -->
    <div id="camera">

      <!-- Images -->
      <img id="before-image" class="scene-image" alt="">
      <img id="after-image"  class="scene-image" alt="">

      <!-- Bloom reveal -->
      <div id="flower-reveal"></div>

      <!-- Light layers -->
      <div id="warm-overlay"></div>
      <div id="final-glow"></div>
      <div id="window-glow"></div>

      <!-- Minimal atmosphere -->
      <div id="vignette"></div>

    </div>

    <!-- Message -->
    <div id="message">
      Happy Birthday Dr,<br>
      Hope these years be the best
    </div>

    <!-- Click trigger -->
    <div id="hut-hotspot"></div>

  </div>

  <!-- Script -->
  <script src="js/main.js"></script>

</body>
</html>
